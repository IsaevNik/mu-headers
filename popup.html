<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>Mu Header</title>
  </head>
  <body>
    <header class="app-header">
      <h1>Mu Header</h1>
    </header>

    <div class="domain-setting">
      <button
        type="button"
        id="domain-toggle"
        class="domain-toggle"
        aria-expanded="false"
        aria-controls="domain-body"
      >
        <span class="domain-toggle-label">
          <span class="domain-dot" id="domain-dot" hidden></span>
          Restrict to domain
        </span>
        <span class="domain-chevron" aria-hidden="true">▸</span>
      </button>
      <div class="domain-body" id="domain-body" hidden>
        <input
          type="text"
          id="domain-input"
          class="text-input"
          placeholder="e.g. example.com, *.example.com, localhost:8000 (blank = all)"
          spellcheck="false"
          autocomplete="off"
        />
        <p id="domain-error" class="form-error" hidden></p>
        <p class="domain-hint">
          Applies to all headers. Leave blank to send to every site.
          Use <code>*.example.com</code> for subdomains, or add a port like
          <code>localhost:8000</code>.
        </p>
      </div>
    </div>

    <form id="add-form" class="add-form" autocomplete="off">
      <div class="add-row">
        <input
          type="text"
          id="name-input"
          class="text-input"
          placeholder="Header name"
          spellcheck="false"
          required
        />
        <input
          type="text"
          id="value-input"
          class="text-input"
          placeholder="Value"
          spellcheck="false"
        />
      </div>
      <div class="add-actions">
        <label class="sensitive-check">
          <input type="checkbox" id="sensitive-input" />
          <span>Sensitive</span>
        </label>
        <button type="submit" class="btn-add">Add header</button>
      </div>
      <p id="form-error" class="form-error" hidden></p>
    </form>

    <ul id="header-list" class="header-list"></ul>
    <p id="empty-state" class="empty-state" hidden>
      No headers yet. Add one above.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
